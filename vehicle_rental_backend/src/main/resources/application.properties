# App name
spring.application.name=vehicle_rental_backend

# =============================================
# Aiven MySQL Database Configuration
# =============================================
spring.datasource.url=jdbc:mysql://mysql-bb328e7-sara-07.f.aivencloud.com:23232/defaultdb?ssl-mode=REQUIRED

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port (IMPORTANT for Railway)
server.port=${PORT:8080}